<div class="mb-4">
    <button class="btn btn-primary w-100 rounded-4 py-3"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#addMedicationForm">
        ➕ הוספת תרופה
    </button>
</div>

<div class="collapse mb-4" id="addMedicationForm">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body">
            <h4 class="mb-3">הוספת תרופה</h4>

            <form method="post">
                {% if current_user.is_admin %}
                <div class="mb-3">
                    <label class="form-label">משתמש</label>
                    <select name="user_id" class="form-select">
                        {% for user in users %}
                            <option value="{{ user.id }}">{{ user.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">שם התרופה</label>
                    <input name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">זמן ביום</label>
                    <select name="time_of_day" class="form-select">
                        <option>בוקר</option>
                        <option>צהריים</option>
                        <option>ערב</option>
                        <option>לילה</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">הערות</label>
                    <input name="notes" class="form-control">
                </div>

                <button class="btn btn-success w-100">שמור תרופה</button>
            </form>
        </div>
    </div>
</div>
